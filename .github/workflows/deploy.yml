name: Build & Deploy Everything

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - uses: actions/checkout@v3

    # 2. Setup Java
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Build Backend
    - name: Build Backend
      run: |
        cd backend
        mvn clean package -DskipTests

    # 4. Setup Node
    - name: Set up Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    # 5. Build Frontend
    - name: Build Frontend
      run: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build

    # 6. Deploy Frontend to GitHub Pages
    - name: Deploy Frontend to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/dist

    # 7. Upload Backend as Release
    - name: Upload Backend JAR as Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: backend/target/my-vite-spring-app-1.0-SNAPSHOT.jar
        tag_name: build-${{ github.run_number }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 8. Success Message
    - name: ✅ Deployment Complete
      run: |
        echo "✅ Frontend deployed to GitHub Pages"
        echo "📦 Backend JAR available in Releases"
        echo "🌐 Frontend: https://illescas970103.github.io/controller-fca-informatica/"
        echo "🔗 Repository: https://github.com/Illescas970103/controller-fca-informatica"
