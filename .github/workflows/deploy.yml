name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout del código
    - uses: actions/checkout@v3

    # 2. Setup Java para el backend
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Compilar el backend
    - name: Build Backend with Maven
      run: |
        cd backend
        mvn clean package -DskipTests

    # 4. Setup Node para el frontend
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    # 5. Instalar dependencias del frontend
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install --legacy-peer-deps

    # 6. Compilar el frontend
    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    # 7. Deploy del frontend a GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/dist
        cname: controller-fca-informatica.github.io

    # 8. Upload del backend compilado como artifact
    - name: Upload Backend JAR
      uses: actions/upload-artifact@v3
      with:
        name: backend-jar
        path: backend/target/my-vite-spring-app-1.0-SNAPSHOT.jar
        retention-days: 30

    # 9. Crear Release con el JAR
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: build-${{ github.run_number }}
        release_name: Build ${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./backend/target/my-vite-spring-app-1.0-SNAPSHOT.jar
        asset_name: app-${{ github.run_number }}.jar
        asset_content_type: application/java-archive

    - name: Print Success Message
      run: |
        echo "✅ Frontend deployed to GitHub Pages!"
        echo "✅ Backend JAR available as artifact and release!"
        echo "🌐 Frontend URL: https://illescas970103.github.io/controller-fca-informatica/"
