name: Deploy Backend to Render

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'Procfile'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend
      run: |
        cd backend
        mvn clean package -DskipTests

    - name: Deploy to Render
      env:
        RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
          curl "$RENDER_DEPLOY_HOOK_URL"
          echo "✅ Deployment triggered on Render"
        else
          echo "⚠️  RENDER_DEPLOY_HOOK_URL not configured"
          echo "📝 To enable auto-deploy: Add RENDER_DEPLOY_HOOK_URL to GitHub Secrets"
        fi

    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v3
      with:
        name: backend-latest
        path: backend/target/my-vite-spring-app-1.0-SNAPSHOT.jar
        retention-days: 7
